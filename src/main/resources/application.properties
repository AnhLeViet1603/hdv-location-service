# ===============================
# APP
# ===============================
spring.application.name=location-service
server.port=8081
# ===============================
# REDIS
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000
# Lettuce connection pool
spring.data.redis.lettuce.pool.max-active=5
spring.data.redis.lettuce.pool.max-idle=3
spring.data.redis.lettuce.pool.min-idle=1
# ===============================
# POSTGRESQL
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/location_db
spring.datasource.username=postgres
spring.datasource.password=root
# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=2000
spring.datasource.hikari.max-lifetime=1800000
# ===============================
# SERVER THREAD
# ===============================
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=10
# ===============================
# WORKER CONFIG
# ===============================
app.buffer.max-size=500
app.buffer.flush-interval=5000
app.worker.time-out=3000000000
app.worker.cleanup-interval=5000
# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.jdbc.core=INFO
logging.level.org.springframework.data.redis=INFO
# ===============================
# KAFKA
# ===============================
spring.kafka.bootstrap-servers=localhost:9092
# Consumer
spring.kafka.consumer.group-id=location-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer-class-config=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JacksonJsonDeserializer
# Cho phķp deserialize object
spring.kafka.consumer.properties.spring.json.trusted.packages=*
# N?u b?n d∙ng class c? th?
spring.kafka.consumer.properties.spring.json.value.default.type=com.mywebsite.locationservice.model.event.DriverAcceptedEvent
# Listener
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=2